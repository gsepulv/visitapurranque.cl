<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión — Visita Purranque</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a3c34 0%, #0f2620 100%);
            color: #e5e7eb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .offline-container {
            max-width: 440px;
        }
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: .8;
        }
        .offline-logo {
            font-size: 1.6rem;
            font-weight: 700;
            color: #4ade80;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #9ca3af;
            margin-bottom: 24px;
        }
        .offline-btn {
            display: inline-block;
            padding: 12px 28px;
            background: #22c55e;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background .2s;
        }
        .offline-btn:hover { background: #16a34a; }
        .offline-tip {
            margin-top: 30px;
            font-size: .85rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">&#9888;</div>
        <div class="offline-logo">Visita Purranque</div>
        <h1>Sin conexión a internet</h1>
        <p>Estás en una zona sin señal. Los contenidos que visitaste anteriormente están disponibles en tu dispositivo.</p>
        <button class="offline-btn" onclick="location.reload()">Reintentar conexión</button>
        <p class="offline-tip">Guía turística de Purranque, Región de Los Lagos</p>
    </div>
</body>
</html>
